CORRUPTION:
  DATASET: cifar10_c
  SEVERITY: [5]
  TYPE: [gaussian_noise]
  NUM_EX: 10000
MODEL:
  ADAPTATION: calm
  ARCH: ViT-B-16
  WEIGHTS: openai
  USE_CLIP: True
  EPISODIC: False
OPTIM:
  LR: 1e-3
  METHOD: AdamW
  STEPS: 1
  BETA: 0.9
  WD: 0.01
TEST:
  BATCH_SIZE: 200
  NUM_WORKERS: 0
CLIP:
  PRECISION: "fp32"
  FREEZE_TEXT_ENCODER: False
  PROMPT_MODE: "custom"
  PROMPT_TEMPLATE: ["a photo of a {}."]
CALM:
  LAMBDA_MI: 5.0
  W_COV: 0.0
  W_I2T: 1.0
  ALPHA_S: 2.0
  USE_UNIFORM_I2T: True
  BETA_MARG: 0.9
