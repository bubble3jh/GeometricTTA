# GeometricTTA — gaussian_noise, severity=5, N=10K
# Phase 1: Sinkhorn OT + Fréchet Mean (Weiszfeld)
# Phase 2: Stiefel projection + Decaying Potential Field
CORRUPTION:
  DATASET: cifar10_c
  SEVERITY:
    - 5
  TYPE:
    - gaussian_noise
MODEL:
  ADAPTATION: geometrictta
  ARCH: ViT-B-16
  WEIGHTS: openai
  USE_CLIP: True
  EPISODIC: False
OPTIM:
  LR: 1e-3
  METHOD: AdamW
  STEPS: 1
  BETA: 0.9
  WD: 0.01
TEST:
  BATCH_SIZE: 200
CLIP:
  PRECISION: "fp32"
  FREEZE_TEXT_ENCODER: False
  PROMPT_MODE: "custom"
  PROMPT_TEMPLATE: ["a photo of a {}."]
GEOMETRIC_TTA:
  EPSILON: 0.1     # Sinkhorn entropy regularization
  ALPHA: 10.0      # Decaying potential field decay coefficient
  LAMBDA: 1.0      # Weight of L_inter
  N_SINKHORN: 20   # Sinkhorn iterations
  N_WEISZFELD: 2   # Weiszfeld iterations
