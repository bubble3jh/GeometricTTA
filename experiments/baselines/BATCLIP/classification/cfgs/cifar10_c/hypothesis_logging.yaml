CORRUPTION:
  DATASET: cifar10_c
  SEVERITY:
    - 5
  TYPE:
    - gaussian_noise
    - shot_noise
    - impulse_noise
    - defocus_blur
    - glass_blur
    - motion_blur
    - zoom_blur
    - snow
    - frost
    - fog
    - brightness
    - contrast
    - elastic_transform
    - pixelate
    - jpeg_compression
  NUM_EX: 1000
MODEL:
  ADAPTATION: source
  ARCH: ViT-B-16
  WEIGHTS: openai
  USE_CLIP: True
  EPISODIC: False
OPTIM:
  LR: 1e-3
  METHOD: Adam
  STEPS: 1
  BETA: 0.9
  WD: 0.0
TEST:
  BATCH_SIZE: 200
CLIP:
  PRECISION: "fp32"
  FREEZE_TEXT_ENCODER: False
  PROMPT_MODE: "custom"
  PROMPT_TEMPLATE: ["a photo of a {}."]
SAVE_DIR: "experiments/runs/hypothesis_testing/logs"
RNG_SEED: 42
SETTING: "reset_each_shift"
