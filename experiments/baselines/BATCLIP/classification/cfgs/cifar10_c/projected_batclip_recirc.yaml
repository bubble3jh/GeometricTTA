# ProjectedBATCLIP — 1K recirculation regime
# All 3 components active. MAX_RECIRC_STEPS=50 with d_eff_parallel early stopping.
# Expected usage: set CORRUPTION.NUM_EX=1000 or feed first 1K samples.
CORRUPTION:
  DATASET: cifar10_c
  SEVERITY:
    - 5
  TYPE:
    - gaussian_noise
MODEL:
  ADAPTATION: projectedbatclip
  ARCH: ViT-B-16
  WEIGHTS: openai
  USE_CLIP: True
  EPISODIC: False
OPTIM:
  LR: 1e-3
  METHOD: AdamW
  STEPS: 1
  BETA: 0.9
  WD: 0.01
TEST:
  BATCH_SIZE: 200
CLIP:
  PRECISION: "fp32"
  FREEZE_TEXT_ENCODER: False
  PROMPT_MODE: "custom"
  PROMPT_TEMPLATE: ["a photo of a {}."]
PROJECTED_BATCLIP:
  TAU_GATE: "median"      # Component 2: dynamic median gate
  MAX_RECIRC_STEPS: 50    # Component 3: recirculate up to 50 steps per batch
  DEFF_EPS: 0.01          # plateau threshold
  PLATEAU_PATIENCE: 3     # consecutive plateau steps before early stop
